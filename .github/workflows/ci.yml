name: ci
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: bash syntax (-n)
        run: |
          for f in install.sh uninstall.sh wiki/*.sh wiki/pre-push claude/hooks/*.sh hooks/*.sh; do
            echo "checking $f"; bash -n "$f"
          done
      - name: python syntax
        run: python3 -m py_compile dash/carryover-dash.py claude/hooks/*.py hooks/*.py
      - name: no hook drift (plugin copies == canonical)
        run: |
          for f in mem-save.py mem-save.sh carryover-recall.sh; do
            diff "hooks/$f" "claude/hooks/$f" && echo "in sync: $f"
          done
      - name: JSON manifests valid
        run: |
          python3 - <<'PY'
          import json, glob
          for f in glob.glob(".claude-plugin/*.json") + ["hooks/hooks.json"]:
              json.load(open(f)); print("ok", f)
          PY
      - name: TOML commands valid
        run: |
          python3 - <<'PY'
          import tomllib, glob
          for f in glob.glob("commands/*.toml"):
              tomllib.load(open(f, "rb")); print("ok", f)
          PY
      - name: dedup unit test
        run: python3 tests/test_dedup.py
      - name: memory backend (builtin) test
        run: python3 tests/test_store.py
      - name: Obsidian vault export/import test
        run: python3 tests/test_vault.py
      - name: install/uninstall sandbox test
        run: bash tests/sandbox-test.sh
