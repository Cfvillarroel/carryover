description = "Recall what carryover already knows about a topic"
prompt = """Recall stored knowledge for the user. Run via Bash:

```bash
bash ~/.headroom/recall.sh {{args}}
```

Present the matches clearly (grouped by repo if helpful). If no arguments were given, ask
the user what they want to recall. By default it searches only the current repo's memories;
pass `--all` as the first argument to search every repo. This is a fast keyword lookup over
the knowledge store; for the full live view use the `co-dash` dashboard."""
